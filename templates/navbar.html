<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">LOGO</a>

        <form class="d-flex ms-auto me-3" method="GET" action="{% url 'home' %}">
            <input class="form-control" type="text" name="q" placeholder="Search Rooms...">
        </form>

        <div class="d-flex align-items-center">
            {% if request.user.is_authenticated %}
                <span class="me-2">@{{ request.user.username }}</span>
                <a class="btn btn-outline-secondary btn-sm" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="btn btn-outline-primary btn-sm me-2" href="{% url 'login' %}">Login</a>
                <a class="btn btn-primary btn-sm" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>
